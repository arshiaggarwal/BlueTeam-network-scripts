---
# Master Deployment Script
# Deploys MySQL firewall and service hardening

- name: Deploy MySQL Hardening
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Display deployment banner
      debug:
        msg:
          - "================================================"
          - "  BLUE TEAM MYSQL HARDENING DEPLOYMENT"
          - "================================================"
          - "Target: SCP-DATABASE-01 (10.10.10.102)"
          - ""
          - "This will:"
          - "  1. Validate grey team access"
          - "  2. Harden firewall ports"
          - "  3. Secure MySQL service and users"
          - ""
          - "Estimated completion time: 3-5 minutes"
          - "================================================"

- name: Step 1 - Validate Grey Team Access
  import_playbook: playbooks/greyteam-validate.yml

- name: Step 2 - Apply Port Hardening
  import_playbook: playbooks/port-harden.yml

- name: Step 3 - Harden MySQL Service
  import_playbook: playbooks/mysql-harden.yml

- name: Deployment Complete
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Display completion message
      debug:
        msg:
          - "================================================"
          - "  DEPLOYMENT COMPLETE"
          - "================================================"
          - ""
          - "✓ Grey team MySQL access validated"
          - "✓ Firewall hardened:"
          - "    - MySQL (3306): Apache + Grey Team only"
          - "    - SSH (22): Existing access maintained"
          - "    - ICMP: Grey Team only"
          - "    - Blocked: DC, SMB, SMTP, OpenSSH, OpenVPN"
          - ""
          - "✓ MySQL service hardened:"
          - "    - All user passwords changed"
          - "    - Anonymous users removed"
          - "    - Test database removed"
          - "    - Remote root disabled"
          - "    - Dangerous privileges revoked"
          - "    - Config hardened (local_infile=0, bind-address set)"
          - ""
          - "IMPORTANT:"
          - "  → New passwords saved to: mysql_passwords_SCP-DATABASE-01.txt"
          - "  → Update Apache application config with new DB password"
          - "  → Test Apache -> MySQL connection"
          - ""
          - "To reverse changes: ansible-playbook reverse.yml"
          - "================================================"
