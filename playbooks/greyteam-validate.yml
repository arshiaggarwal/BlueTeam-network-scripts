---
# Validate Grey Team Access to MySQL
# Ensures scoring engine can reach database

- name: Validate Grey Team Access - Database Server
  hosts: database
  gather_facts: yes
  tasks:
    - name: Install UFW
      apt:
        name: ufw
        state: present
        update_cache: yes

    - name: Allow MySQL from Grey Team IPs
      ufw:
        rule: allow
        port: '3306'
        proto: tcp
        from_ip: "{{ item }}"
        comment: "Grey Team MySQL Access"
      loop: "{{ grey_team_ips }}"

    - name: Allow ICMP from Grey Team IPs
      ufw:
        rule: allow
        proto: icmp
        from_ip: "{{ item }}"
        comment: "Grey Team ICMP"
      loop: "{{ grey_team_ips }}"

    - name: Display validation status
      debug:
        msg: "Grey team MySQL access validated for {{ inventory_hostname }}"
