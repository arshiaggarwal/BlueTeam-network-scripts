---
# Port Hardening for MySQL Database Server
# Restrict access to only necessary connections

- name: Port Hardening - SCP-DATABASE-01 (MySQL Server)
  hosts: database
  gather_facts: yes
  tasks:
    - name: Install UFW
      apt:
        name: ufw
        state: present
        update_cache: yes

    - name: Reset UFW to defaults
      ufw:
        state: reset

    - name: Set UFW default deny incoming
      ufw:
        direction: incoming
        policy: deny

    - name: Set UFW default allow outgoing
      ufw:
        direction: outgoing
        policy: allow

    - name: Allow SSH (22) - keeping existing access
      ufw:
        rule: allow
        port: '22'
        proto: tcp
        comment: "SSH Access"

    - name: Allow MySQL from Apache server
      ufw:
        rule: allow
        port: '3306'
        proto: tcp
        from_ip: "{{ service_ips.apache }}"
        comment: "MySQL from Apache"

    - name: Allow MySQL from Grey Team (scoring)
      ufw:
        rule: allow
        port: '3306'
        proto: tcp
        from_ip: "{{ item }}"
        comment: "MySQL from Grey Team"
      loop: "{{ grey_team_ips }}"

    - name: Block MySQL from other Blue Team infrastructure
      ufw:
        rule: deny
        port: '3306'
        proto: tcp
        from_ip: "{{ item }}"
        comment: "Block MySQL from {{ item }}"
      loop: "{{ blocked_blue_team_ips }}"

    - name: Block ICMP except from Grey Team (already allowed above)
      ufw:
        rule: deny
        proto: icmp
        comment: "Block ICMP by default"

    - name: Allow loopback traffic
      ufw:
        rule: allow
        interface: lo
        direction: in

    - name: Allow loopback outbound
      ufw:
        rule: allow
        interface: lo
        direction: out

    - name: Limit outbound DNS to DC only
      ufw:
        rule: allow
        direction: out
        to_ip: "{{ service_ips.dc }}"
        to_port: '53'
        proto: any
        comment: "DNS to DC"

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Display port hardening status
      debug:
        msg: 
          - "Port hardening complete for {{ inventory_hostname }}"
          - "MySQL (3306) allowed from: Apache ({{ service_ips.apache }}) + Grey Team"
          - "MySQL (3306) blocked from: DC, SMB, SMTP, OpenSSH, OpenVPN"
          - "SSH (22) still accessible"
          - "ICMP blocked except Grey Team"
